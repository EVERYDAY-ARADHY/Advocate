kind = "web"
previewPath = "/"
title = "Daily Habits"
version = "1.0.0"
id = "artifacts/habits"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24470

[services.development]
run = "pnpm --filter @workspace/habits run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/habits", "run", "build" ]
publicDir = "artifacts/habits/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24470"
BASE_PATH = "/"
